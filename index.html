<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Movies Crackd</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #07070b;
      --bg-gradient: radial-gradient(circle at top, #14102c 0%, #07070b 60%);
      --card-bg: rgba(18, 18, 28, 0.6);
      --card-hover: rgba(26, 26, 42, 0.85);
      --border: rgba(255, 255, 255, 0.07);
      --border-hover: rgba(106, 90, 212, 0.4);
      --text: #ffffff;
      --text-sub: #94a3b8;
      --text-dim: #64748b;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --emerald: #10b981;
      --amber: #f59e0b;
      --crimson: #ef4444;
      --blue: #3b82f6;
      --font-outfit: 'Outfit', sans-serif;
      --font-inter: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html, body {
      max-width: 100%;
      overflow-x: hidden;
      width: 100%;
    }

    body {
      background: var(--bg);
      background-image: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      font-family: var(--font-inter);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    #details-page-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -10;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      overflow: hidden;
    }

    #details-page-bg img {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: auto;
      object-fit: cover;
      -webkit-mask-image: linear-gradient(to right, black 0%, black 10%, transparent 50%);
      mask-image: linear-gradient(to right, black 0%, black 10%, transparent 50%);
    }

    #details-page-bg::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(to bottom, var(--bg) 0%, transparent 12%),
        linear-gradient(to top, var(--bg) 0%, transparent 12%);
      z-index: 1;
    }

    .app-container {
      width: 100%;
      max-width: 1100px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      flex-grow: 1;
    }

    /* Header Bar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      height: 30px;
      width: auto;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 10px rgba(99, 102, 241, 0.25));
    }

    .brand span {
      font-family: var(--font-inter);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Premium Pill Tabs */
    .tabs-container {
      background: rgba(18, 18, 28, 0.7);
      border: 1px solid var(--border);
      padding: 6px;
      border-radius: 30px;
      display: flex;
      gap: 4px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-sub);
      font-family: var(--font-inter);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    /* Views */
    .view-panel {
      display: none;
      flex-direction: column;
      gap: 24px;
      animation: fadeIn 0.4s ease;
    }

    .view-panel.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── SEARCH ENGINE TAB ── */
    .search-bar-row {
      display: flex;
      gap: 16px;
      align-items: center;
      width: 100%;
    }

    .search-input-wrap {
      position: relative;
      flex-grow: 1;
    }

    .search-input-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-dim);
      pointer-events: none;
      transition: color 0.3s;
    }

    .search-input {
      width: 100%;
      background: rgba(18, 18, 28, 0.6);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px 14px 48px;
      color: var(--text);
      font-family: var(--font-inter);
      font-size: 14px;
      transition: all 0.3s;
      outline: none;
      backdrop-filter: blur(12px);
    }

    .search-input:focus {
      border-color: var(--accent);
      background: rgba(22, 22, 38, 0.8);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .search-input:focus + svg {
      color: var(--accent);
    }

    /* Horizontal Category Scroller */
    .categories-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none; /* Firefox */
    }

    .categories-row::-webkit-scrollbar {
      display: none; /* Safari / Chrome */
    }

    .cat-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--text-sub);
      font-family: var(--font-inter);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .cat-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .cat-btn.active {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--accent);
      color: #c7d2fe;
      box-shadow: inset 0 0 10px rgba(99, 102, 241, 0.05);
    }

    /* Responsive Movie Poster Grid */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 28px;
      width: 100%;
    }

    .movie-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      position: relative;
    }

    .movie-card:hover {
      transform: translateY(-8px);
      background: var(--card-hover);
      border-color: var(--border-hover);
      box-shadow: 0 12px 30px rgba(99, 102, 241, 0.15);
    }

    .poster-wrap {
      width: 100%;
      aspect-ratio: 9 / 12.5;
      border-radius: 14px;
      overflow: hidden;
      background: #11111b;
      position: relative;
    }

    .poster-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .movie-card:hover .poster-img {
      transform: scale(1.04);
    }

    /* Full-card absolute overlay on hover, completely stable without changing card dimensions! */
    .poster-hover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end; /* bottom-aligned */
      justify-content: flex-start; /* left-aligned */
      padding: 18px;
      box-sizing: border-box;
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 2;
      pointer-events: none;
      border-radius: 17px;
      overflow: hidden;
      transform: scale(0.98);
    }

    .movie-card:hover .poster-hover-overlay {
      opacity: 1;
      transform: scale(1);
    }

    .hover-bg-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 17px;
      z-index: -2;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .movie-card:hover .hover-bg-img {
      transform: scale(1.04);
    }

    .hover-overlay-gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      /* Premium gradient darken background */
      background: linear-gradient(to top, rgba(10, 10, 15, 0.98) 0%, rgba(10, 10, 15, 0.65) 50%, rgba(10, 10, 15, 0) 100%);
      /* Sophisticated gradient blur using CSS mask-image and backdrop-filter */
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      -webkit-mask-image: linear-gradient(to top, black 0%, rgba(0, 0, 0, 0.85) 50%, transparent 100%);
      mask-image: linear-gradient(to top, black 0%, rgba(0, 0, 0, 0.85) 50%, transparent 100%);
      border-radius: 17px;
    }

    .hover-overlay-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      text-align: left;
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      transform: translateY(12px);
    }

    .movie-card:hover .hover-overlay-content {
      transform: translateY(0);
    }

    .hover-overlay-main-title {
      color: #ffffff;
      font-family: var(--font-outfit);
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.95);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .hover-overlay-extra {
      color: rgba(255, 255, 255, 0.72);
      font-family: var(--font-inter);
      font-weight: 500;
      line-height: 1.45;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.8);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .poster-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 32px;
      background: linear-gradient(135deg, #161622 0%, #0d0d15 100%);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .movie-card:hover .poster-placeholder {
      transform: scale(1.04);
    }

    /* Category Tag Overlay */
    .cat-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
      color: #fff;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 3;
      transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .cat-badge.hollywood { background: rgba(16, 185, 129, 0.8); }
    .cat-badge.bollywood { background: rgba(59, 130, 246, 0.8); }
    .cat-badge.anime { background: rgba(239, 68, 68, 0.8); }

    .movie-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 2px 4px 6px 4px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 1;
    }

    .movie-card:hover .movie-details {
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
    }

    .movie-title {
      font-family: var(--font-outfit);
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-meta {
      font-size: 11px;
      color: var(--text-sub);
      display: flex;
      justify-content: space-between;
    }

    /* Skeleton Loading State */
    .skeleton-card {
      pointer-events: none;
    }

    .skeleton-img {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #13131f 25%, #1c1c2e 50%, #13131f 75%);
      background-size: 200% 100%;
      animation: pulse 1.5s infinite;
    }

    .skeleton-text {
      height: 14px;
      background: linear-gradient(90deg, #13131f 25%, #1c1c2e 50%, #13131f 75%);
      background-size: 200% 100%;
      animation: pulse 1.5s infinite;
      border-radius: 4px;
    }

    @keyframes pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Same-Page Details / Options Panel */
    .detail-panel {
      display: none;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }

    .detail-title {
      font-family: var(--font-outfit);
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      flex-grow: 1;
      white-space: normal;
      word-wrap: break-word;
      line-height: 1.4;
    }

    /* Available Options Cards */
    .option-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .option-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
      backdrop-filter: blur(12px);
    }

    .option-card:hover {
      background: var(--card-hover);
      border-color: var(--border-hover);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.08);
    }

    .option-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .option-quality {
      font-family: var(--font-outfit);
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
    }

    .option-btn {
      background: var(--accent);
      border: none;
      color: #ffffff;
      font-family: var(--font-inter);
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 2px 10px var(--accent-glow);
    }

    .option-btn:hover {
      background: #7c3aed;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }

    /* ── DIRECT URL TAB ── */
    .direct-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .direct-input-row {
      display: flex;
      gap: 14px;
      width: 100%;
    }

    .direct-input {
      flex-grow: 1;
      background: rgba(18, 18, 28, 0.6);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      color: var(--text);
      font-family: var(--font-inter);
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
      backdrop-filter: blur(12px);
    }

    .direct-input:focus {
      border-color: var(--accent);
      background: rgba(22, 22, 38, 0.8);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .go-btn {
      background: var(--accent);
      border: none;
      color: #ffffff;
      font-family: var(--font-inter);
      font-size: 14px;
      font-weight: 700;
      padding: 0 28px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .go-btn:hover {
      background: #5046e5;
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
    }

    /* Active Downloads Queue */
    .downloads-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    .section-title {
      font-family: var(--font-outfit);
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .downloads-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      min-height: 200px;
    }

    .download-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      transition: all 0.3s;
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .download-card.done {
      border-color: rgba(16, 185, 129, 0.25);
      background: linear-gradient(90deg, rgba(18, 18, 28, 0.6) 50%, rgba(16, 185, 129, 0.06) 100%);
    }

    .download-card.failed {
      border-color: rgba(239, 68, 68, 0.25);
      background: linear-gradient(90deg, rgba(18, 18, 28, 0.6) 50%, rgba(239, 68, 68, 0.06) 100%);
    }

    .download-card.active {
      border-color: rgba(99, 102, 241, 0.25);
      background: linear-gradient(90deg, rgba(18, 18, 28, 0.6) 50%, rgba(99, 102, 241, 0.06) 100%);
    }

    .download-card-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .dl-index {
      font-weight: 700;
      color: var(--accent);
      font-size: 13px;
      flex-shrink: 0;
    }

    .dl-filename {
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .method-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 3px 6px;
      border-radius: 4px;
      color: #000000;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .method-badge.v2 { background: var(--emerald); }
    .method-badge.v1 { background: var(--amber); }
    .method-badge.cloud { background: #d946ef; }
    .method-badge.telegram { background: #3b82f6; color: #fff; }

    .download-card-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .dl-status-compact {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .dl-download-btn {
      background: linear-gradient(135deg, var(--emerald), #059669);
      color: #ffffff;
      border: none;
      padding: 8px 18px;
      border-radius: 10px;
      font-family: var(--font-inter);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      box-shadow: 0 2px 12px rgba(16, 185, 129, 0.25);
      white-space: nowrap;
    }

    .dl-download-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(16, 185, 129, 0.4);
    }

    .dl-retry-btn {
      background: rgba(239, 68, 68, 0.12);
      color: var(--crimson);
      border: 1px solid rgba(239, 68, 68, 0.25);
      padding: 8px 16px;
      border-radius: 10px;
      font-family: var(--font-inter);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .dl-retry-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* Compact progress bar (only shown when actively downloading) */
    .dl-progress-mini {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 0 0 14px 14px;
      transition: width 0.3s ease;
    }

    .download-card.done .dl-progress-mini {
      background: var(--emerald);
    }

    .download-card.failed .dl-progress-mini {
      background: var(--crimson);

      font-weight: 600;

    .tg-dot.warning { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
    .tg-dot.notready { background: var(--crimson); box-shadow: 0 0 8px var(--crimson); }

      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.25s;

    .retry-all-btn:hover {

    .option-group-card {

    /* Global metadata row under main detailed title */
    .detail-meta-row {
      display: flex;

      margin-bottom: 22px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);

    /* Accordion styles */
    .accordion-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .accordion-item {
      background: rgba(16, 16, 26, 0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .accordion-item.active {
      border-color: rgba(99, 102, 241, 0.4);
      background: rgba(22, 22, 38, 0.95);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.08);
    }

    .accordion-header {
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }

    .accordion-header:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .accordion-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .accordion-icon {
      font-size: 16px;
    }

    .accordion-title {
      font-family: var(--font-outfit);
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
    }

    .accordion-count {
      font-family: var(--font-inter);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 10px;
      border-radius: 12px;
    }

    .chevron-icon {
      color: var(--text-sub);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .accordion-item.active .chevron-icon {
      transform: rotate(180deg);
      color: var(--accent);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .accordion-content-inner {
      padding: 6px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    @media (max-width: 600px) {
      html, body {
        max-width: 100%;
        overflow-x: hidden !important;
        width: 100%;
      }

      .app-container {
        padding: 16px 12px;
        gap: 16px;
        max-width: 100%;
        overflow-x: hidden !important;

      header {
        flex-direction: column;
        align-items: center;
        gap: 16px;
        margin-bottom: 4px;

        width: 100%;

      .cat-btn {

        font-size: 11px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* Exactly two movie cards per row on mobile! */
      .movie-grid {
        grid-template-columns: repeat(2, minmax(120px, 170px)) !important;
        gap: 16px 12px !important;
        width: 100% !important;
        margin: 0 auto !important;
        justify-content: center !important;
        box-sizing: border-box !important;
      }

      .movie-card {

        gap: 6px !important;

        width: 100% !important;

      .movie-title {

        line-height: 1.2;

      .movie-meta-pill {

      .movie-meta-row {
        gap: 3px;

        gap: 10px;

      .back-btn {

        height: 34px;
      }

      .detail-title {
        font-size: 15px;
      }

      .detail-meta-row {
        flex-wrap: wrap;
        gap: 6px;
      }

      .accordion-header {
        padding: 12px 14px;
      }

      .accordion-header-left {
        gap: 8px;
      }

      .accordion-title {
        font-size: 12px;
      }

      .accordion-count {
        padding: 2px 6px;
        font-size: 9px;
      }

      .accordion-content-inner {
        padding: 6px 10px 14px 10px;
        gap: 10px;
      }

      /* Keep option cards compact single-row on mobile */
      .option-group-card {
        flex-wrap: wrap !important;
        gap: 10px !important;

      }

      .option-left-block {
        min-width: 0 !important;
        gap: 10px !important;
      }

      .monitor-icon-wrapper {
        width: 32px !important;

        border-radius: 8px !important;
      }

      .monitor-svg {
        width: 14px !important;

      }

      .res-title {
        font-size: 13px !important;
      }

      .res-subtitle {
        font-size: 9px !important;
      }

      .pill-size {
        font-size: 9px !important;
        padding: 3px 10px !important;
      }

      .option-middle-block {
        flex-grow: 0 !important;
      }

      .divider-line {
        display: none !important;
      }

      .option-buttons-row {
        flex-wrap: wrap !important;
        gap: 6px !important;
      }

      .option-dl-btn {
        padding: 8px 12px !important;
        font-size: 11px !important;

      /* Direct downloads / Active Downloads layout on mobile */
      .direct-input-row {
        flex-direction: column;

        font-size: 16px !important; /* Force 16px to prevent iOS Safari auto-zoom on focus */

      .download-card-left {
        width: 100%;

      .download-card-right {
        width: 100%;

      }

      .dl-download-btn {
        width: 100%;
        justify-content: center;
      }

      .dl-retry-btn {
        width: 100%;
        text-align: center;
      }

      .download-info {
        width: 100%;
      }

        flex-direction: column;
        gap: 10px;

        text-align: center;
      }

      .retry-all-btn {
        width: 100%;
      }

    <!-- ── VIEW 1: SEARCH ENGINE VIEW ── -->
    <div id="search-view" class="view-panel active">
      
      <!-- Primary Search Panel & Category Tags -->
      <div class="search-bar-row">
        <div class="search-input-wrap">
          <input type="text" class="search-input" id="search-box" placeholder="Type movie, season, or show title to search…" onkeyup="onSearchKeyup(event)">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </div>

      <div class="categories-row">
        <button class="cat-btn active" onclick="selectCategory('All')">All Categories</button>
        <button class="cat-btn" onclick="selectCategory('Hollywood')">Hollywood</button>
        <button class="cat-btn" onclick="selectCategory('Bollywood')">Bollywood</button>
        <button class="cat-btn" onclick="selectCategory('Anime')">Anime</button>
      </div>

      <!-- Search Results Movie Card Grid -->
      <div class="movie-grid" id="search-results">
        <!-- Renders dynamically -->
      </div>

      <!-- same page detailed quality selection container -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
          <button class="back-btn" onclick="closeDetails()" title="Back to Search">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="stroke-width:2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          </button>
          <h2 class="detail-title" id="detail-title">Movie Title Options</h2>
        </div>
        <div class="detail-meta-row" id="detail-meta-row"></div>
        <div class="option-grid" id="option-list">
          <!-- Option cards render dynamically -->
        </div>
      </div>

    </div>

    <!-- ── VIEW 2: DIRECT URL VIEW ── -->
    <div id="direct-view" class="view-panel">
      <div class="direct-container">
        
        <!-- Back to Movie button row, hidden by default -->
        <div class="direct-back-row" id="direct-back-row" style="display: none; margin-bottom: 20px;">
          <button class="back-btn-direct" onclick="goBackToMovie()" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); padding: 10px 20px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; backdrop-filter: blur(10px); box-shadow: var(--shadow-sm);">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 18px; height: 18px; stroke-width: 2.5;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>

          </button>
        </div>

        <div class="direct-input-row">
          <input type="text" id="direct-url-box" class="direct-input" placeholder="Paste direct link here (driveseed / modpro / animeflix / leechpro) and hit enter…">
          <button class="go-btn" onclick="startDirectDownload()">Go</button>
        </div>

        <div class="downloads-section">
          <h3 class="section-title">
            Active Downloads
          </h3>
          <div class="downloads-list" id="downloads-list">
            <!-- Download progress cards render dynamically -->
          </div>
        </div>

        <!-- System status & Telegram ready footer (hidden in cloud mode) -->
        <div class="status-bar-footer" id="status-bar-footer">
          <div id="footer-status-text">Ready</div>
          
          <button class="retry-all-btn" id="retry-failed-btn" style="display:none;" onclick="retryFailedAll()">Retry Failed</button>
          
          <div class="tg-status" id="tg-status-badge">
            <div class="tg-dot" id="tg-dot"></div>
            <span id="tg-text">Telegram: Checking…</span>
          </div>
        </div>

      </div>

  </div>

  <script>
    let activeTab = 'search';
    let currentCategory = 'All';
    let isCloudMode = false;
    let activeSearchController = null;
    let downloadsInterval = null;
    let allFetchedResults = [];
    let lastSearchQuery = '';

    // Startup Init
    window.addEventListener('DOMContentLoaded', () => {
      // Start polling status & downloads
      pollStatus();
      pollDownloads();
      downloadsInterval = setInterval(() => {
        pollDownloads();
        pollStatus();
      }, 1000);

      // Hide status footer in cloud mode after first poll
      setTimeout(() => {
        if (isCloudMode) {
          const footer = document.getElementById('status-bar-footer');
          if (footer) footer.style.display = 'none';
        }
      }, 1500);

      // Forcefully prevent pinch-to-zoom gestures on mobile devices
      document.addEventListener('touchstart', (event) => {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });

      // Forcefully prevent double-tap-to-zoom gestures on mobile devices
      let lastTouchEnd = 0;
      document.addEventListener('touchend', (event) => {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
    });

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));
      
      if (tab === 'search') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('search-view').classList.add('active');
      } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('direct-view').classList.add('active');
        
        // Hide details and cleanly restore search view elements under-the-hood
        closeDetails();
        
        // Reset Direct tab back button & show the direct link input row
        document.getElementById('direct-back-row').style.display = 'none';
        document.querySelector('.direct-input-row').style.display = 'flex';
      }
    }

    function selectCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText.includes(cat)) btn.classList.add('active');
      });
      
      const q = document.getElementById('search-box').value.trim();
      
      // If we have cached results for the current search query, filter them locally instantly!
      if (allFetchedResults.length > 0 && q.toLowerCase() === lastSearchQuery.toLowerCase()) {
        filterAndRenderResultsLocally(q);
      } else {
        // Otherwise trigger a new search
        triggerSearch();
      }
    }

    function filterAndRenderResultsLocally(query) {
      const resultsDiv = document.getElementById('search-results');
      const detailPanel = document.getElementById('detail-panel');
      
      // Ensure search view is visible only if we aren't currently viewing the details page
      if (detailPanel.style.display !== 'flex') {
        detailPanel.style.display = 'none';
        resultsDiv.style.display = 'grid';
      }

      let filtered = [];
      if (currentCategory === 'All') {
        filtered = [...allFetchedResults];
      } else if (currentCategory === 'Hollywood') {
        filtered = allFetchedResults.filter(item => (item.category || '').toUpperCase() === 'HOLLYWOOD');
      } else if (currentCategory === 'Bollywood') {
        filtered = allFetchedResults.filter(item => (item.category || '').toUpperCase() === 'BOLLYWOOD');
      } else if (currentCategory === 'Anime') {
        filtered = allFetchedResults.filter(item => (item.category || '').toUpperCase() === 'ANIMEFLIX');
      }

      // Sort items based on relevance matching the current query
      filtered.sort((a, b) => {
        const scoreA = getRelevanceScore(a.title, query, a.category);
        const scoreB = getRelevanceScore(b.title, query, b.category);
        return scoreA - scoreB;
      });

      if (filtered.length === 0) {
        resultsDiv.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 40px;">No results found in this category.</div>';
      } else {
        renderGridItems(filtered);
      }
    }

    // Debounced Search triggers
    let searchDebounceTimer = null;
    function onSearchKeyup(e) {
      if (e.key === 'Enter') {
        clearTimeout(searchDebounceTimer);
        triggerSearch();
      } else {
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(triggerSearch, 500);
      }
    }

    function triggerSearch() {
      const q = document.getElementById('search-box').value.trim();
      const resultsDiv = document.getElementById('search-results');
      const detailPanel = document.getElementById('detail-panel');
      
      // Close details and reset background when searching again
      const bgElement = document.getElementById('details-page-bg');
      if (bgElement) bgElement.style.opacity = '0';
      document.querySelector('.search-bar-row').style.display = 'block';
      document.querySelector('.categories-row').style.display = 'flex';
      document.querySelector('.tabs-container').style.display = 'flex';
      
      detailPanel.style.display = 'none';
      resultsDiv.style.display = 'grid';

      if (q.length < 2) {
        resultsDiv.innerHTML = '';
        allFetchedResults = [];
        lastSearchQuery = '';
        return;
      }

      // Abort active streaming search request
      if (activeSearchController) {
        activeSearchController.abort();
      }

      // Reset cache and track new query
      allFetchedResults = [];
      lastSearchQuery = q;

      // Render search skeletons loading states
      resultsDiv.innerHTML = Array.from({length: 6}).map(() => `
        <div class="movie-card skeleton-card">
          <div class="poster-wrap">
            <div class="skeleton-img"></div>
          </div>
          <div class="movie-details">
            <div class="skeleton-text" style="width: 80%; margin-bottom: 6px;"></div>
            <div class="skeleton-text" style="width: 40%;"></div>
          </div>
        </div>
      `).join('');

      activeSearchController = new AbortController();
      const signal = activeSearchController.signal;
      // We always request 'All' categories from the server to cache them for instantaneous switching!
      const url = `/api/search/stream?q=${encodeURIComponent(q)}&cat=All`;

      // Connect using Server-Sent Events for concurrent realtime streaming!
      const eventSource = new EventSource(url);
      
      eventSource.onmessage = function(event) {
        if (signal.aborted) {
          eventSource.close();
          return;
        }
        
        try {
          const data = JSON.parse(event.data);
          
          if (data.status === 'done') {
            eventSource.close();
            if (allFetchedResults.length === 0) {
              resultsDiv.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 40px;">No results found.</div>';
            } else {
              // Final filter and redraw
              filterAndRenderResultsLocally(q);
            }
            return;
          }

          if (data.status === 'error') {
            eventSource.close();
            resultsDiv.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--crimson); padding: 40px;">Error: ${data.message}</div>`;
            return;
          }

          if (data.item) {
            // Append this item to the cache instantly
            const item = data.item;
            allFetchedResults.push(item);
            
            // Render the currently selected category items in real-time
            filterAndRenderResultsLocally(q);
          }
        } catch (e) {
          console.error(e);
        }
      };

      eventSource.onerror = function() {
        eventSource.close();
      };
    }

    function getRelevanceScore(title, query, category) {
      const t = title.toLowerCase();
      const q = query.toLowerCase();
      let score = 100;
      
      if (t === q) score -= 90;
      else if (t.startsWith(q)) score -= 70;
      else if (t.includes(q)) score -= 50;
      
      // Category priorities
      if (category.toLowerCase() === 'hollywood') score -= 5;
      else if (category.toLowerCase() === 'bollywood') score -= 2;
      
      return score;
    }

    function renderGridItems(items) {
      const resultsDiv = document.getElementById('search-results');
      resultsDiv.innerHTML = items.map(item => {
        const titleRaw = item.title;
        // Split on the first bracket, brace, or parentheses to get the crisp, clean movie name
        let mainTitle = titleRaw.split(/[({\[]/)[0].trim();
        if (!mainTitle) mainTitle = titleRaw;
        
        let extraDetails = titleRaw.substring(mainTitle.length).trim();
        
        // Dynamically compute the absolute best main title font size based on its length
        let mainTitleFontSize = 'font-size: 16.5px;';
        if (mainTitle.length > 30) {
          mainTitleFontSize = 'font-size: 13px;';
        } else if (mainTitle.length > 20) {
          mainTitleFontSize = 'font-size: 14.5px;';
        }
        
        // Dynamically compute the absolute best extra details font size based on its length
        let extraFontSize = 'font-size: 11.5px;';
        if (extraDetails.length > 80) {
          extraFontSize = 'font-size: 9px;';
        } else if (extraDetails.length > 50) {
          extraFontSize = 'font-size: 10px;';
        }

        return `
          <div class="movie-card" onclick="viewDetails('${encodeURIComponent(JSON.stringify(item))}')">
            <div class="poster-wrap">
              <span class="cat-badge ${item.category.toLowerCase()}">${item.category}</span>
              ${item.thumbnail ? `<img class="poster-img" src="${item.thumbnail}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">` : ''}
              <div class="poster-placeholder" style="${item.thumbnail ? 'display:none;' : ''}">🎬</div>
            </div>
            <div class="poster-hover-overlay">
              ${item.thumbnail ? `<img class="hover-bg-img" src="${item.thumbnail}" loading="lazy">` : `<div class="hover-bg-img poster-placeholder">🎬</div>`}
              <div class="hover-overlay-gradient"></div>
              <div class="hover-overlay-content">
                <div class="hover-overlay-main-title" style="${mainTitleFontSize}">${mainTitle}</div>
                ${extraDetails ? `<div class="hover-overlay-extra" style="${extraFontSize}">${extraDetails}</div>` : ''}
              </div>
            </div>
            <div class="movie-details">
              <div class="movie-title" title="${item.title}">${item.title}</div>
              <div class="movie-meta">
                <span>ModList</span>
                <span>Online</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function parseQualityTitle(title) {
      let originalTitle = title;
      
      // 1. Size extraction: e.g. [200MB] or (200MB) or [200 MB]
      let size = '';
      const sizeMatch = title.match(/[\[\(](\d+(?:\.\d+)?\s*[kmgt]?i?b)[\]\)]/i);
      if (sizeMatch) {
        size = sizeMatch[1];
        title = title.replace(sizeMatch[0], '').trim();
      }
      
      // 2. Season extraction: e.g. "Season 1" or "S01"
      let season = '';
      const seasonMatch = title.match(/(Season\s+\d+|S\d+)/i);
      if (seasonMatch) {
        season = seasonMatch[1];
        title = title.replace(seasonMatch[0], '').trim();
      }

      // 3. Resolution extraction: e.g. "480p", "720p", "1080p", "2160p"
      let resolution = '';
      const resMatch = title.match(/(\d+p|4k|2160p)/i);
      if (resMatch) {
        resolution = resMatch[1];
        title = title.replace(resMatch[0], '').trim();
      }

      // 4. Language extraction: e.g. (Hindi-English) or [Multi-Audio]
      let lang = '';
      const langMatch = title.match(/[\[\(]([a-zA-Z0-9\s-]+)[\]\)]/i);
      if (langMatch) {
        lang = langMatch[1];
        title = title.replace(langMatch[0], '').trim();
      }

      // 5. Split remaining tags
      const tags = title.split(/\s+/)
        .map(s => s.trim())
        .filter(s => s && s.toLowerCase() !== 'download' && s !== '-' && s !== '•');

      return {
        season: season,
        lang: lang,
        resolution: resolution,
        size: size,
        tags: tags,
        fallbackTitle: originalTitle
      };
    }

    function getResolutionClass(res) {
      res = (res || '').toLowerCase();
      if (res.includes('480')) return 'res-480p';
      if (res.includes('720')) return 'res-720p';
      if (res.includes('1080')) return 'res-1080p';
      if (res.includes('2160') || res.includes('4k')) return 'res-4k';
      return '';
    }

    function getQualityTheme(res, qualityTitle) {
      const title = (qualityTitle || '').toLowerCase();
      res = (res || '').toLowerCase();
      
      if (res.includes('480')) {
        return {
          class: 'theme-480p',
          title: '480P',
          subtitle: 'Standard Definition',
          color: '#06b6d4',
          bgGlow: 'rgba(6, 182, 212, 0.12)',
          borderGlow: 'rgba(6, 182, 212, 0.35)',
          btnBg: 'rgba(6, 182, 212, 0.15)',
          btnBorder: 'rgba(6, 182, 212, 0.35)',
          btnColor: '#22d3ee',
          btnHoverBg: '#0891b2'
        };
      }
      
      if (res.includes('720')) {
        if (title.includes('265') || title.includes('hevc') || title.includes('10bit')) {
          return {
            class: 'theme-720p-ready',
            title: '720P',
            subtitle: 'HD Ready',
            color: '#10b981',
            bgGlow: 'rgba(16, 185, 129, 0.12)',
            borderGlow: 'rgba(16, 185, 129, 0.35)',
            btnBg: 'rgba(16, 185, 129, 0.15)',
            btnBorder: 'rgba(16, 185, 129, 0.35)',
            btnColor: '#34d399',
            btnHoverBg: '#059669'
          };
        } else {
          return {
            class: 'theme-720p-quality',
            title: '720P',
            subtitle: 'HD Quality',
            color: '#fbbf24',
            bgGlow: 'rgba(245, 158, 11, 0.12)',
            borderGlow: 'rgba(245, 158, 11, 0.35)',
            btnBg: 'rgba(245, 158, 11, 0.15)',
            btnBorder: 'rgba(245, 158, 11, 0.35)',
            btnColor: '#fbbf24',
            btnHoverBg: '#d97706'
          };
        }
      }
      
      if (res.includes('1080')) {
        return {
          class: 'theme-1080p',
          title: '1080P',
          subtitle: 'Full HD',
          color: '#a855f7',
          bgGlow: 'rgba(168, 85, 247, 0.12)',
          borderGlow: 'rgba(168, 85, 247, 0.35)',
          btnBg: 'rgba(168, 85, 247, 0.15)',
          btnBorder: 'rgba(168, 85, 247, 0.35)',
          btnColor: '#c084fc',
          btnHoverBg: '#9333ea'
        };
      }
      
      if (res.includes('2160') || res.includes('4k')) {
        return {
          class: 'theme-4k',
          title: '4K UHD',
          subtitle: 'Ultra HD',
          color: '#ec4899',
          bgGlow: 'rgba(236, 72, 153, 0.12)',
          borderGlow: 'rgba(236, 72, 153, 0.35)',
          btnBg: 'rgba(236, 72, 153, 0.15)',
          btnBorder: 'rgba(236, 72, 153, 0.35)',
          btnColor: '#f472b6',
          btnHoverBg: '#db2777'
        };
      }
      
      // Fallback
      return {
        class: 'theme-default',
        title: res.toUpperCase() || 'VIDEO',
        subtitle: 'High Quality',
        color: '#94a3b8',
        bgGlow: 'rgba(148, 163, 184, 0.12)',
        borderGlow: 'rgba(148, 163, 184, 0.35)',
        btnBg: 'rgba(148, 163, 184, 0.15)',
        btnBorder: 'rgba(148, 163, 184, 0.35)',
        btnColor: '#cbd5e1',
        btnHoverBg: '#475569'
      };
    }

    // Same-Page Options Detail view
    function viewDetails(encodedItem) {
      const item = JSON.parse(decodeURIComponent(encodedItem));
      const resultsDiv = document.getElementById('search-results');
      const detailPanel = document.getElementById('detail-panel');
      const optionList = document.getElementById('option-list');
      const metaRow = document.getElementById('detail-meta-row');
      
      // Hide search bar, category buttons, tabs bar, and search card grid
      document.querySelector('.search-bar-row').style.display = 'none';
      document.querySelector('.categories-row').style.display = 'none';
      document.querySelector('.tabs-container').style.display = 'none';
      resultsDiv.style.display = 'none';
      
      detailPanel.style.display = 'flex';
      
      // Load movie poster into page background fading in smoothly!
      const bgElement = document.getElementById('details-page-bg');
      const bgImg = document.getElementById('details-page-bg-img');
      if (item.thumbnail) {
        bgImg.src = item.thumbnail;
        bgElement.style.opacity = '0.35';
      } else {
        bgImg.src = '';
        bgElement.style.opacity = '0';
      }

      document.getElementById('detail-title').innerText = item.title;
      if (metaRow) metaRow.style.display = 'none';
      
      // Render loader inside details list
      optionList.innerHTML = Array.from({length: 3}).map(() => `
        <div class="option-group-card skeleton-card" style="min-height: 80px; margin-bottom:14px;">
          <div style="display:flex; gap:12px; width:40%;">
            <div class="skeleton-text" style="width: 60px; height: 24px; border-radius:12px;"></div>
            <div class="skeleton-text" style="width: 80px; height: 24px; border-radius:12px;"></div>
          </div>
          <div style="display:flex; gap:12px; margin-left:auto;">
            <div class="skeleton-text" style="width: 120px; height: 36px; border-radius:8px;"></div>
          </div>
        </div>
      `).join('');

      fetch(`/api/detail?url=${encodeURIComponent(item.url)}`)
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            optionList.innerHTML = `<div style="text-align: center; color: var(--crimson); padding: 40px;">Error: ${data.error}</div>`;
            return;
          }
          if (data.options.length === 0) {
            optionList.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 40px;">No download options/qualities found on page.</div>';
            return;
          }
          
          // Extract global languages and tags across all options
          const allLangs = new Set();
          const allGlobalTags = new Set();
          data.options.forEach(opt => {
            const parsed = parseQualityTitle(opt.quality);
            if (parsed.lang) allLangs.add(parsed.lang);
            parsed.tags.forEach(tag => {
              const t = tag.toLowerCase();
              if (t.includes('sub') || t.includes('audio') || t === 'dual' || t.includes('multi')) {
                allGlobalTags.add(tag);
              }
            });
          });

          // Hide global meta row — tags now live inside each season accordion
          if (metaRow) metaRow.style.display = 'none';

          // 1. Group options by exact "quality" text first
          const qualityGroups = {};
          data.options.forEach(opt => {
            const key = opt.quality.trim();
            if (!qualityGroups[key]) {
              qualityGroups[key] = [];
            }
            qualityGroups[key].push(opt);
          });

          // 2. Now group these quality groups by their parsed "Season"
          const seasonGroups = {};
          Object.entries(qualityGroups).forEach(([quality, opts]) => {
            const parsed = parseQualityTitle(quality);
            // Default season label if none parsed (e.g. for movies)
            const seasonName = parsed.season || "Complete Pack / Options";
            if (!seasonGroups[seasonName]) {
              seasonGroups[seasonName] = [];
            }
            seasonGroups[seasonName].push({
              quality: quality,
              parsed: parsed,
              opts: opts
            });
          });

          // 3. Sort season names nicely (e.g. Season 1 before Season 2)
          const entries = Object.entries(seasonGroups);
          entries.sort((a, b) => {
            const numA = parseInt(a[0].match(/\d+/)) || 0;
            const numB = parseInt(b[0].match(/\d+/)) || 0;
            if (numA && numB) return numA - numB;
            return a[0].localeCompare(b[0]);
          });

          // 4. Build accordion HTML structure (all kept COLLAPSED initially)
          let accordionHtml = `<div class="accordion-list">`;
          
          entries.forEach(([seasonName, items], index) => {
            const activeClass = ''; // Inactive/collapsed by default
            const styleHeight = 'style="max-height: 0;"';

            // Render options inside this Season group
            const cardsInnerHtml = items.map(item => {
              const parsed = item.parsed;
              const theme = getQualityTheme(parsed.resolution, item.quality);
              
              // Build buttons row (side-by-side)
              const buttonsHtml = item.opts.map(opt => {
                let icon = '⚡';
                let btnClass = 'primary-dl-btn';
                const txt = opt.button_text.toLowerCase();
                
                if (txt.includes('zip') || txt.includes('batch') || txt.includes('pack')) {
                  icon = '📦';
                  btnClass = 'secondary-dl-btn';
                } else if (txt.includes('telegram')) {
                  icon = '✈️';
                  btnClass = 'secondary-dl-btn';
                }
                
                // For primary button, apply custom HSL glow and matching border inline
                let inlineStyle = '';
                let hoverAttributes = '';
                if (btnClass === 'primary-dl-btn') {
                  inlineStyle = `background: ${theme.btnBg}; border: 1px solid ${theme.btnBorder}; color: ${theme.btnColor}; box-shadow: 0 2px 10px ${theme.btnBg};`;
                  hoverAttributes = `onmouseover="this.style.background='${theme.btnHoverBg}'; this.style.color='#ffffff'; this.style.box-shadow='0 4px 15px ${theme.btnBorder}'" onmouseout="this.style.background='${theme.btnBg}'; this.style.color='${theme.btnColor}'; this.style.box-shadow='0 2px 10px ${theme.btnBg}'"`;
                }

                return `
                  <button class="option-dl-btn ${btnClass}" style="${inlineStyle}" ${hoverAttributes} onclick="startDownload('${encodeURIComponent(opt.url)}')">
                    <span class="btn-icon">${icon}</span>
                    ${opt.button_text}
                  </button>
                `;
              }).join('');

              // Monitor icon element
              const monitorSvg = `
                <svg class="monitor-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                  <line x1="8" y1="21" x2="16" y2="21"></line>
                  <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
              `;

              return `
                <div class="option-group-card ${theme.class}">
                  <div class="option-left-block">
                    <div class="monitor-icon-wrapper">
                      ${monitorSvg}
                    </div>
                    <div class="resolution-info">
                      <div class="res-title">${theme.title}</div>
                      <div class="res-subtitle">${theme.subtitle}</div>
                    </div>
                  </div>
                  
                  <div class="option-middle-block">
                    <span class="pill-size">${parsed.size || 'N/A'}</span>
                  </div>

                  <div class="divider-line"></div>

                  <div class="option-buttons-row">
                    ${buttonsHtml}
                  </div>
                </div>
              `;
            }).join('');

            const countText = items.length === 1 ? '1 Quality Option' : `${items.length} Quality Options`;

            // Compute per-season language and tag pills
            const seasonLangs = new Set();
            const seasonTags = new Set();
            items.forEach(item => {
              if (item.parsed.lang) seasonLangs.add(item.parsed.lang);
              item.parsed.tags.forEach(tag => {
                const t = tag.toLowerCase();
                if (t.includes('sub') || t.includes('audio') || t === 'dual' || t.includes('multi')) {
                  seasonTags.add(tag);
                }
              });
            });
            let seasonPillsHtml = '';
            seasonLangs.forEach(lang => {
              seasonPillsHtml += `<span class="pill-badge pill-lang" style="font-size: 9.5px; padding: 3px 10px; margin-left: 6px;">🔊 ${lang}</span>`;
            });
            seasonTags.forEach(tag => {
              seasonPillsHtml += `<span class="pill-badge pill-tag" style="font-size: 9.5px; padding: 3px 10px; margin-left: 4px;">🏷️ ${tag}</span>`;
            });

            accordionHtml += `
              <div class="accordion-item ${activeClass}">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                  <div class="accordion-header-left">
                    <span class="accordion-icon">🍿</span>
                    <span class="accordion-title">${seasonName}</span>
                    <span class="accordion-count">${countText}</span>
                    ${seasonPillsHtml}
                  </div>
                  <svg class="chevron-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="stroke-width:2.5;"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div class="accordion-content" ${styleHeight}>
                  <div class="accordion-content-inner">
                    ${cardsInnerHtml}
                  </div>
                </div>
              </div>
            `;
          });

          accordionHtml += `</div>`;
          optionList.innerHTML = accordionHtml;
        })
        .catch(e => {
          optionList.innerHTML = `<div style="text-align: center; color: var(--crimson); padding: 40px;">Error: ${e.message}</div>`;
        });
    }

    function toggleAccordion(header) {
      const item = header.parentElement;
      const content = item.querySelector('.accordion-content');
      const isActive = item.classList.contains('active');
      
      // Close all other accordions smoothly
      document.querySelectorAll('.accordion-item').forEach(otherItem => {
        if (otherItem !== item) {
          otherItem.classList.remove('active');
          otherItem.querySelector('.accordion-content').style.maxHeight = null;
        }
      });

      if (isActive) {
        item.classList.remove('active');
        content.style.maxHeight = null;
      } else {
        item.classList.add('active');
        content.style.maxHeight = content.scrollHeight + 'px';
        // Scroll the opened accordion into view smoothly after the expansion animation
        setTimeout(() => {
          item.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 320);
      }
    }

    function closeDetails() {
      // Fade out background poster
      const bgElement = document.getElementById('details-page-bg');
      if (bgElement) bgElement.style.opacity = '0';
      
      // Restore search bar, categories, and tabs bar visibility
      document.querySelector('.search-bar-row').style.display = 'block';
      document.querySelector('.categories-row').style.display = 'flex';
      document.querySelector('.tabs-container').style.display = 'flex';
      
      document.getElementById('detail-panel').style.display = 'none';
      document.getElementById('search-results').style.display = 'grid';
    }

    function showDirectFromDetails() {
      activeTab = 'direct';
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));
      
      document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
      document.getElementById('direct-view').classList.add('active');
      
      // Hide the top header navigation tabs & direct input box
      document.querySelector('.tabs-container').style.display = 'none';
      document.querySelector('.direct-input-row').style.display = 'none';
      
      // Show the premium back button
      document.getElementById('direct-back-row').style.display = 'block';
    }

    function goBackToMovie() {
      // Switch back to search tab under-the-hood
      activeTab = 'search';
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));
      
      document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
      document.getElementById('search-view').classList.add('active');
      
      // Hide the back button, restore direct input row
      document.getElementById('direct-back-row').style.display = 'none';
      document.querySelector('.direct-input-row').style.display = 'flex';
      
      // Keep tabs container hidden since the user is in details view
      document.querySelector('.tabs-container').style.display = 'none';
    }

    // Download API communication handlers
    function startDownload(url) {
      url = decodeURIComponent(url);

      if (isCloudMode) {
        // Skip folder chooser in cloud mode
        showDirectFromDetails();
        fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url, output_dir: 'cloud' })
        });
        return;
      }

      fetch('/api/choose-folder', { method: 'POST' })
        .then(r => r.json())
        .then(folderData => {
          if (folderData.cancelled || !folderData.path) {
            alert("Download cancelled: No directory selected.");
            return;
          }
          
          // Switch to Direct URL tab immediately to watch downloads progress
          showDirectFromDetails();
          
          fetch('/api/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url, output_dir: folderData.path })
          });
        });
    }

    function startDirectDownload() {
      const url = document.getElementById('direct-url-box').value.trim();
      if (!url) return;
      document.getElementById('direct-url-box').value = '';
      startDownload(encodeURIComponent(url));
    }

    // Polling Downloads status
    function pollDownloads() {
      if (activeTab !== 'direct') return; // only poll active view
      
      fetch('/api/downloads')
        .then(r => r.json())
        .then(data => {
          const list = document.getElementById('downloads-list');
          if (data.downloads.length === 0) {
            list.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 60px 0;">No active or completed downloads in queue.</div>';
            return;
          }

          let hasFailed = false;
          list.innerHTML = data.downloads.map(dl => {
            if (dl.state === 3) hasFailed = true; // State Failed
            
            let statusClass = '';
            if (dl.state === 2) statusClass = 'done';
            if (dl.state === 3) statusClass = 'failed';
            if (dl.state === 1) statusClass = 'active';

            const methodClass = (dl.method || '').toLowerCase();

            // Right side content depends on state
            let rightContent = '';
            if (dl.resolved_url) {
              // Completed with resolved URL — show download button
              rightContent = `<a href="${dl.resolved_url}" download="${dl.filename}" target="_blank" class="dl-download-btn">☁ Download to Device</a>`;
            } else if (dl.state === 3) {
              // Failed — show retry button
              rightContent = `<button class="dl-retry-btn" onclick="retryDownload(${dl.index})">Retry</button>`;
            } else if (dl.state === 1) {
              // Actively downloading — show compact status
              rightContent = `<span class="dl-status-compact" style="color: var(--blue)">${dl.status}</span>`;
            } else {
              // Queued or other — show status text
              rightContent = `<span class="dl-status-compact" style="color: var(--text-sub)">${dl.status}</span>`;
            }

            // Only show progress bar if not yet completed
            const progressBar = (dl.state !== 2) ? `<div class="dl-progress-mini" style="width: ${dl.progress * 100}%"></div>` : '';

            return `
              <div class="download-card ${statusClass}">
                <div class="download-card-left">
                  <span class="dl-index">#${dl.index}</span>
                  <span class="dl-filename" title="${dl.filename}">${dl.filename}</span>
                  ${dl.method ? `<span class="method-badge ${methodClass}">${dl.method}</span>` : ''}
                </div>
                <div class="download-card-right">
                  ${rightContent}
                </div>
                ${progressBar}
              </div>
            `;
          }).join('');

          // Show retry all failures button if failures exist
          document.getElementById('retry-failed-btn').style.display = hasFailed ? 'block' : 'none';
        })
        .catch(console.error);
    }

    function pollStatus() {
      fetch('/api/status')
        .then(r => r.json())
        .then(data => {
          isCloudMode = !!data.cloud_mode;
          
          document.getElementById('footer-status-text').innerHTML = 
            `Downloads: Active ${data.active_threads} — Completed ${data.done_count}/${data.total_count} failed ${data.fail_count}`;
          
          const tgText = document.getElementById('tg-text');
          const tgDot = document.getElementById('tg-dot');
          tgText.innerText = data.telegram.text;
          
          tgDot.className = 'tg-dot';
          if (data.telegram.color === 'green') tgDot.classList.add('ready');
          else if (data.telegram.color === 'amber') tgDot.classList.add('warning');
          else tgDot.classList.add('notready');
        })
        .catch(console.error);
    }

    function retryDownload(index) {
      fetch('/api/retry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ index: index })
      });
    }

    function retryFailedAll() {
      fetch('/api/retry-all', { method: 'POST' });
    }
  </script>
