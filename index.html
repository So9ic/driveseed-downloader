      <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('search')">Search Engine</button>
        <button class="tab-btn" onclick="switchTab('direct')">Direct URL</button>
      </div>
    </header>

    <!-- ── VIEW 1: SEARCH ENGINE VIEW ── -->
    <div id="search-view" class="view-panel active">
      
      <!-- Primary Search Panel & Category Tags -->
      <div class="search-bar-row">
        <div class="search-input-wrap">
          <input type="text" class="search-input" id="search-box" autocomplete="off" placeholder="Type movie, series, or show title…" onkeyup="onSearchKeyup(event)">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <button class="clear-search-btn" id="clear-search-btn" onclick="clearSearch()" title="Clear search">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
          <!-- IMDb Suggestions Dropdown -->
          <div class="imdb-suggestions-dropdown" id="imdb-suggestions" style="display: none;"></div>
        </div>
      </div>

      <div class="categories-row">
        <button class="cat-btn active" onclick="selectCategory('All')">All Categories</button>
        <button class="cat-btn" onclick="selectCategory('Hollywood')">Hollywood</button>
        <button class="cat-btn" onclick="selectCategory('Bollywood')">Bollywood</button>
        <button class="cat-btn" onclick="selectCategory('Anime')">Anime</button>
      </div>

      <!-- Search Results Movie Card Grid -->
      <div class="movie-grid" id="search-results">
        <!-- Renders dynamically -->
      </div>

      <!-- same page detailed quality selection container -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
          <button class="back-btn" onclick="closeDetails()" title="Back to Search">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="stroke-width:2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          </button>
          <h2 class="detail-title" id="detail-title">Movie Title Options</h2>
        </div>
        <div class="detail-meta-row" id="detail-meta-row"></div>
        <div class="option-grid" id="option-list">
          <!-- Option cards render dynamically -->
        </div>
      </div>

    </div>

    <!-- ── VIEW 2: DIRECT URL VIEW ── -->
    <div id="direct-view" class="view-panel">
      <div class="direct-container">
        
        <!-- Back to Movie button row, hidden by default -->
        <div class="direct-back-row" id="direct-back-row" style="display: none; margin-bottom: 20px;">
          <button class="back-btn-direct" onclick="goBackToMovie()" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); padding: 10px 20px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; backdrop-filter: blur(10px); box-shadow: var(--shadow-sm);">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 18px; height: 18px; stroke-width: 2.5;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
            Back to Movie Details
          </button>
        </div>

        <div class="direct-input-row">
          <input type="text" id="direct-url-box" class="direct-input" placeholder="Paste direct link here (driveseed / modpro / animeflix / leechpro) and hit enter…">
          <button class="go-btn" onclick="startDirectDownload()">Go</button>
        </div>

        <div class="downloads-section">
          <div class="downloads-list" id="downloads-list">
            <!-- Download progress cards render dynamically -->
          </div>
        </div>

        <!-- System status & Telegram ready footer (hidden in cloud mode) -->
        <div class="status-bar-footer" id="status-bar-footer">
          <div id="footer-status-text">Ready</div>
          
          <button class="retry-all-btn" id="retry-failed-btn" style="display:none;" onclick="retryFailedAll()">Retry Failed</button>
          
          <div class="tg-status" id="tg-status-badge">
            <div class="tg-dot" id="tg-dot"></div>
            <span id="tg-text">Telegram: Checking…</span>
          </div>
        </div>

      </div>
    </div>

  </div>
